[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Proxy /api/* to the Render backend — no CORS config needed on the frontend
[[redirects]]
  from   = "/api/*"
  to     = "https://audio-splitter-app.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — must come AFTER the /api proxy
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

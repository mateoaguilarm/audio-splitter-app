[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirect all routes to index.html for SPA routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Backend API is a separate service — proxy requests in production
# Uncomment and set VITE_API_URL in Netlify env vars to your backend URL
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://your-backend.railway.app/api/:splat"
#   status = 200
#   force  = true
